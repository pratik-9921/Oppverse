<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to OppVerse – Smart Opportunity Discovery for students." />
  <title>Login – OppVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <!-- Inline theme apply before paint to prevent flash -->
  <script>
    (function() {
      const t = localStorage.getItem('oppverse_theme');
      if (t === 'dark') document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-base);
      color: var(--text-primary);
      padding: 16px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .login-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.12);
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 14px;
      text-align: center;
    }
    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .form-label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper .form-input {
      padding-right: 44px; /* room for the eye icon */
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--accent-primary); }
    .toggle-pw svg { width: 16px; height: 16px; }
    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      margin-top: 6px;
      border-radius: 10px;
    }
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--accent-primary);
      text-decoration: none;
      margin-top: -6px;
      margin-bottom: 18px;
      cursor: pointer;
      font-weight: 600;
    }
    .forgot-link:hover { text-decoration: underline; }
    .toggle-mode {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
    }
    .toggle-mode a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    .toggle-mode a:hover { text-decoration: underline; }
    #error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #ef4444;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: left;
      display: none;
      animation: fadeUp 0.2s ease;
    }
    #success-msg {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.35);
      color: #10b981;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: left;
      display: none;
      animation: fadeUp 0.2s ease;
    }
    #tip-msg {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.35);
      color: #d97706;
      font-size: 12px;
      padding: 9px 13px;
      border-radius: 8px;
      margin-bottom: 14px;
      text-align: left;
      display: none;
      animation: fadeUp 0.2s ease;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .admin-note {
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }
    .admin-note strong { color: var(--text-secondary); }
    .theme-toggle-login {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-toggle-login:hover { border-color: var(--accent-primary); color: var(--text-primary); }
    .theme-toggle-login svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <button class="theme-toggle-login" id="theme-toggle-login" title="Toggle Theme">
    <i data-lucide="sun"></i>
  </button>

  <div class="login-wrap">
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-icon"><i data-lucide="zap"></i></div>
        <span>Opp<span class="logo-accent">Verse</span></span>
      </div>
      <div class="login-subtitle" id="mode-subtitle">Sign in to your account</div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email (e.g. yourname@gmail.com or college email)" autocomplete="email" required />
        </div>
        <div class="form-group" id="name-group" style="display:none;">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="Your full name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" id="toggle-pw" title="Show / Hide password" aria-label="Toggle password visibility">
              <i data-lucide="eye" id="pw-icon"></i>
            </button>
          </div>
        </div>
        <a id="forgot-link" class="forgot-link" tabindex="0">Forgot Password?</a>

        <div id="error-msg"></div>
        <div id="success-msg"></div>
        <div id="tip-msg"></div>

        <button type="submit" class="btn btn-primary login-btn" id="submit-btn">
          <i data-lucide="log-in"></i> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <div class="toggle-mode">
        <span id="toggle-text">Don't have an account?</span>&nbsp;
        <a id="toggle-link">Create Account</a>
     
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL      = 'https://kzjaxtwbapgnauhvlexj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6amF4dHdiYXBnbmF1aHZsZXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzY1MTcsImV4cCI6MjA5MjcxMjUxN30.Txl6krC5aBylKp7u27FL89HXNCUneGcXIoIjseAz91M';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── DOM ──
    lucide.createIcons();

    const form       = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passInput  = document.getElementById('password');
    const nameInput  = document.getElementById('name');
    const nameGroup  = document.getElementById('name-group');
    const errorMsg   = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const submitBtn  = document.getElementById('submit-btn');
    const toggleLink = document.getElementById('toggle-link');
    const forgotLink = document.getElementById('forgot-link');

    // ── Show / Hide Password ──
    const togglePwBtn = document.getElementById('toggle-pw');
    let pwVisible = false;
    togglePwBtn.addEventListener('click', () => {
      pwVisible = !pwVisible;
      passInput.type = pwVisible ? 'text' : 'password';
      document.getElementById('pw-icon').setAttribute('data-lucide', pwVisible ? 'eye-off' : 'eye');
      lucide.createIcons();
      passInput.focus();
    });

    let isRegister = false;

    // ── Already logged in? ──
    const existingRole = localStorage.getItem('oppverse_role');
    if (existingRole === 'admin') window.location.href = 'admin.html';
    else if (existingRole === 'user') window.location.href = 'index.html';

    // ── Theme toggle ──
    const themeBtn = document.getElementById('theme-toggle-login');
    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark-mode', dark);
      themeBtn.innerHTML = `<i data-lucide="${dark ? 'moon' : 'sun'}"></i>`;
      lucide.createIcons();
    }
    applyTheme(localStorage.getItem('oppverse_theme') === 'dark');
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark-mode');
      localStorage.setItem('oppverse_theme', isDark ? 'dark' : 'light');
      applyTheme(isDark);
    });

    // ── Toggle mode ──
    toggleLink.addEventListener('click', () => {
      isRegister = !isRegister;
      document.getElementById('mode-subtitle').textContent = isRegister ? 'Create a new account' : 'Sign in to your account';
      submitBtn.innerHTML = isRegister
        ? '<i data-lucide="user-plus"></i> Create Account'
        : '<i data-lucide="log-in"></i> Sign In';
      document.getElementById('toggle-text').textContent = isRegister ? 'Already have an account?' : "Don't have an account?";
      toggleLink.textContent = isRegister ? 'Sign In' : 'Create Account';
      nameGroup.style.display = isRegister ? 'flex' : 'none';
      nameGroup.style.flexDirection = 'column';
      nameGroup.style.gap = '6px';
      forgotLink.style.display = isRegister ? 'none' : 'block';
      passInput.setAttribute('autocomplete', isRegister ? 'new-password' : 'current-password');
      clearMessages();
      lucide.createIcons();
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }
    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }
    function clearMessages() {
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
    }
    function setLoading(on) {
      submitBtn.disabled = on;
      if (on) {
        submitBtn.innerHTML = '<i data-lucide="loader"></i> Please wait…';
      } else {
        submitBtn.innerHTML = isRegister
          ? '<i data-lucide="user-plus"></i> Create Account'
          : '<i data-lucide="log-in"></i> Sign In';
      }
      lucide.createIcons();
    }

    // ── EMAIL VALIDATION ─────────────────────────────────
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const BLOCKED_DOMAINS = ['test.com', 'fake.com', 'abc.com', 'mail.com', 'example.com', 'temp.com', 'yopmail.com', 'mailinator.com'];
    const COLLEGE_PATTERNS = ['.edu', '.ac.in', '.edu.in', '.ac.uk', '.edu.au'];

    function validateEmail(email) {
      if (!email) return { ok: false, error: 'Email address is required.' };

      if (!emailRegex.test(email))
        return { ok: false, error: 'Please enter a valid email address.' };

      const domain = email.split('@')[1].toLowerCase();

      if (BLOCKED_DOMAINS.includes(domain))
        return { ok: false, error: 'Please use a real email address.' };

      const isCollege = COLLEGE_PATTERNS.some(p => domain.endsWith(p));
      const tip = !isCollege
        ? 'Tip: Use your college email for better access.'
        : null;

      return { ok: true, tip };
    }

    const tipMsg = document.getElementById('tip-msg');
    function showTip(msg) {
      if (msg) { tipMsg.textContent = '💡 ' + msg; tipMsg.style.display = 'block'; }
      else tipMsg.style.display = 'none';
    }
    // Override clearMessages to also hide tip
    const _origClear = clearMessages;
    clearMessages = function() { _origClear(); tipMsg.style.display = 'none'; };

    // Live email validation feedback on blur
    emailInput.addEventListener('blur', () => {
      const val = emailInput.value.trim().toLowerCase();
      if (!val) return;
      const result = validateEmail(val);
      if (!result.ok) {
        showError(result.error);
      } else {
        clearMessages();
        showTip(result.tip);
      }
    });
    emailInput.addEventListener('input', () => { clearMessages(); });

    // ── FORM SUBMIT ──
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      const email = emailInput.value.trim().toLowerCase();
      const pass  = passInput.value;

      // Empty field checks
      if (!email) { showError('Email address is required.'); emailInput.focus(); return; }
      if (!pass)  { showError('Password is required.'); passInput.focus(); return; }

      // Smart email validation
      const emailCheck = validateEmail(email);
      if (!emailCheck.ok) { showError(emailCheck.error); emailInput.focus(); return; }

      // Show college tip (non-blocking)
      showTip(emailCheck.tip);

      if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }

      // ── HARDCODED ADMIN BYPASS ──
      if (email === 'admin@oppverse.com' && pass === 'admin@123') {
        localStorage.setItem('oppverse_role', 'admin');
        localStorage.setItem('oppverse_email', email);
        localStorage.setItem('oppverse_name', 'Administrator');
        window.location.href = 'admin.html';
        return;
      }

      setLoading(true);

      if (isRegister) {
        // ── SIGN UP via Supabase Auth ──
        const { data, error } = await supabase.auth.signUp({
          email,
          password: pass,
          options: {
            data: { full_name: nameInput.value.trim() || 'Student' },
            emailRedirectTo: 'https://oppverse.vercel.app/login.html'
          }
        });

        setLoading(false);
        if (error) {
          if (error.message.includes('already registered')) {
            showError('This email is already registered. Please sign in.');
          } else {
            showError(error.message);
          }
        } else {
          if (data.user && !data.session) {
            // Email confirmation required
            showSuccess('✓ Account created! Check your email to confirm your account, then sign in.');
          } else {
            // Auto-confirmed
            localStorage.setItem('oppverse_role', 'user');
            localStorage.setItem('oppverse_email', email);
            localStorage.setItem('oppverse_name', nameInput.value.trim() || 'Student');
            window.location.href = 'index.html';
          }
        }
      } else {
        // ── SIGN IN via Supabase Auth ──
        const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

        setLoading(false);
        if (error) {
          if (error.message.includes('Invalid login credentials')) {
            showError('Invalid email or password. Please try again.');
          } else if (error.message.includes('Email not confirmed')) {
            showError('Please confirm your email before logging in. Check your inbox.');
          } else {
            showError(error.message);
          }
        } else {
          const name = data.user?.user_metadata?.full_name || email.split('@')[0];
          localStorage.setItem('oppverse_role', 'user');
          localStorage.setItem('oppverse_email', email);
          localStorage.setItem('oppverse_name', name);
          window.location.href = 'index.html';
        }
      }
    });

    // ── FORGOT PASSWORD ──
    forgotLink.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) {
        showError('Enter your email address first, then click Forgot Password.');
        return;
      }
      clearMessages();
      forgotLink.textContent = 'Sending…';
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://oppverse.vercel.app/login.html'
      });
      forgotLink.textContent = 'Forgot Password?';
      if (error) {
        showError('Could not send reset email: ' + error.message);
      } else {
        showSuccess('✓ Password reset email sent! Check your inbox.');
      }
    });
    forgotLink.addEventListener('keydown', (e) => { if (e.key === 'Enter') forgotLink.click(); });
  </script>
</body>
</html>
